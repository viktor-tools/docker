# Viktor Deep Analysis — GitLab CI Example
#
# Triggers a deep code analysis when Viktor's webhook calls the GitLab Pipelines Trigger API,
# after a member/maintainer comments "/viktor deep" on a merge request. Viktor's backend
# validates permissions and credits, then starts this pipeline and injects the MR_IID and
# BASE_BRANCH pipeline variables — this job does not re-implement that check.
#
# Required CI/CD variables (set in Settings > CI/CD > Variables):
#   - VIKTOR_APP_ID     : Your Viktor project ID (masked)
#   - VIKTOR_APP_SECRET : Your Viktor project secret key (masked)
#
# Also required: a Pipeline Trigger Token (Settings > CI/CD > Pipeline triggers), configured in
# the Viktor project settings.
#
# The built-in $CI_JOB_TOKEN provides read access to the current repository.
# For private repositories hosted on a different GitLab instance, use a
# Project Access Token with read_repository scope stored as GITLAB_TOKEN.
#
# Usage:
#   1. Merge or include this file in your .gitlab-ci.yml
#   2. Set VIKTOR_APP_ID and VIKTOR_APP_SECRET in your CI/CD variables
#   3. Comment "/viktor deep" on a merge request to trigger analysis

stages:
  - analysis

viktor-deep:
  stage: analysis
  image: docker:latest
  services:
    - docker:dind

  # Only run when triggered by Viktor via the Pipelines API
  rules:
    - if: $CI_PIPELINE_SOURCE == "trigger"

  variables:
    VIKTOR_API_URL: "https://api.viktor.tools"

  # MR_IID and BASE_BRANCH are injected by Viktor as pipeline variables when triggering this
  # job via the Pipelines API — the $CI_MERGE_REQUEST_* predefined variables are NOT available
  # on "trigger"-sourced pipelines.
  script:
    - |
      docker run --rm \
        -e VIKTOR_APP_ID="$VIKTOR_APP_ID" \
        -e VIKTOR_APP_SECRET="$VIKTOR_APP_SECRET" \
        -e REPO_URL="$CI_REPOSITORY_URL" \
        -e BRANCH="$CI_COMMIT_REF_NAME" \
        -e BASE_BRANCH="$BASE_BRANCH" \
        -e MR_IID="$MR_IID" \
        -e VCS_TOKEN="${GITLAB_TOKEN:-$CI_JOB_TOKEN}" \
        -e VIKTOR_API_URL="$VIKTOR_API_URL" \
        ghcr.io/viktor-tools/docker/deep:latest
