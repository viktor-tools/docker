# Viktor Deep Analysis — GitHub Actions Example
#
# Triggers a deep code analysis when Viktor's webhook dispatches a "viktor-deep-analysis"
# repository event, after a maintainer/member/collaborator comments "/viktor deep" on a pull
# request. Viktor's backend validates permissions and credits before dispatching this event —
# this workflow does not re-implement that check.
#
# Required repository secrets:
#   - VIKTOR_APP_SECRET : Your Viktor project secret key
#
# Minimal required token permissions (set at workflow or job level):
#   - pull-requests: read   (to read PR metadata and post the result comment)
#   - contents: read        (to clone the repository)
#
# Usage:
#   1. Copy this file to .github/workflows/viktor-deep.yml in your repository
#   2. Set VIKTOR_APP_SECRET in your repository secrets
#   3. Comment "/viktor deep" on a pull request to trigger analysis

name: Viktor Deep Analysis

on:
  repository_dispatch:
    types: [viktor-deep-analysis]

permissions:
  pull-requests: read
  contents: read

jobs:
  viktor-deep:
    name: Viktor Deep Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Get pull request branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.client_payload.pr_number,
            });
            core.setOutput('branch', pr.data.head.ref);
            core.setOutput('base_branch', pr.data.base.ref);

      - name: Run Viktor Deep Analysis
        env:
          VIKTOR_APP_ID: YOUR_VIKTOR_APP_ID
          VIKTOR_APP_SECRET: ${{ secrets.VIKTOR_APP_SECRET }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          BRANCH: ${{ steps.pr.outputs.branch }}
          BASE_BRANCH: ${{ steps.pr.outputs.base_branch }}
          PR_NUMBER: ${{ github.event.client_payload.pr_number }}
          VCS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: override the default Viktor API URL
          # VIKTOR_API_URL: https://api.viktor.tools
        run: |
          docker run --rm \
            -e VIKTOR_APP_ID \
            -e VIKTOR_APP_SECRET \
            -e REPO_URL \
            -e BRANCH \
            -e BASE_BRANCH \
            -e PR_NUMBER \
            -e VCS_TOKEN \
            -e VIKTOR_API_URL \
            ghcr.io/viktor-tools/docker/deep:latest
